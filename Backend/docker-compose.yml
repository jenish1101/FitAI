services:
  mongodb:
    image: mongo:7
    container_name: fitai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - fitai_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fitai-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  fitai_mongo_data:
